<div class="auth-page container-fluid p-0">
  <div class="row min-vh-100 g-0">

    <div class="col-lg-6 text-side">
    </div>

    <!-- Right Side -->
    <div class="col-lg-6 form-side">

      <app-lang class="position-fixed end-0 p-4 top-0 mt-4" style="z-index: 1050;"></app-lang>

      <div class="login-card">

        <!-- Header Section -->
        <div class="d-flex align-items-center justify-content-center gap-3 mb-4">
          <div class="rounded-circle bg-white shadow-sm d-flex align-items-center justify-content-center border" style="width: 70px; height: 70px;">
            <i [class]="step === 1 ? 'fa-solid fa-envelope text-danger fs-4' : 'fa-solid fa-key text-danger fs-4'"></i>
          </div>
          <div class="text-end">
            <h2 class="fw-bold mb-1">{{ step === 1 ? 'استعادة كلمة المرور' : 'التحقق من الكود' }}</h2>
            <p class="text-muted mb-0 text-center">
              {{ step === 1 ? 'أدخل بريدك الإلكتروني لإرسال رمز التحقق' : 'أدخل رمز OTP المرسل إلى بريدك' }}
            </p>
          </div>
        </div>


        <!-- step one  -->

        @if(step === 1){
  <form  [formGroup]="emailForm" (ngSubmit)="sendOtp()">
          <app-field dir="rtl"
            label="البريد الإلكتروني"
            placeholder="أدخل بريدك الإلكتروني المسجل"
            [control]="email"
            [icon]="'fa-envelope'"

          />

          <div class="mt-4">
            <app-btn
              label="إرسال رمز التحقق (OTP)"
              width="100%"
              customColor="#B3000E"
              [isDisabled]="emailForm.invalid"
            />
          </div>
        </form>
        }



        <!-- step two  -->
        <form *ngIf="step === 2" [formGroup]="otpForm" (ngSubmit)="verifyOtp()">
          <app-field dir="rtl"
            label="رمز التحقق (OTP)"
            placeholder="أدخل الرمز المكون من 6 أرقام"
            [control]="otpCode"
            [icon]="'fa-solid fa-shield-halved'"
          />

          <div class="d-flex justify-content-between align-items-center my-3" dir="rtl">
            <span class="text-muted small">لم يصلك الكود؟</span>
            <button type="button" class="btn btn-link text-danger text-decoration-none p-0 small fw-bold" (click)="resendOtp()">إعادة إرسال</button>
          </div>

          <div class="mt-4">
            <app-btn
              label="تأكيد الرمز"
              width="100%"
              customColor="#B3000E"
              [isDisabled]="otpForm.invalid"
            />
          </div>
        </form>

        <div class="signup mt-4 text-center">
          <a class="text-decoration-none text-danger fw-bold" routerLink="/login">العودة لتسجيل الدخول</a>
        </div>

      </div>

    </div>

  </div>
</div>
